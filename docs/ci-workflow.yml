name: CI - The Legacy Circle
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  build-check:
    name: Build and Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --if-present || npm install --if-present
      - name: Run tests
        run: npm test --if-present
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build --if-present
      - name: Smoke test live app
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://the-legacy-circle-59ad81c4.base44.app)
          echo "HTTP status: $STATUS"
          test "$STATUS" = "200" && echo "Live app OK" || (echo "FAILED" && exit 1)
